# Nazwa binarki
project_name: GoBatManager

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin # To jest macOS
    goarch:
      - amd64
      - arm64 # Wsparcie dla procesorów Apple M1/M2/M3
        # Wstrzykiwanie wersji do zmiennej w kodzie Go
    ldflags:
      - -X main.version={{.Version}}

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md*
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'